{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

/* Background */
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("{% static './images/theatre.png' %}");

background-size:cover;
background-position:center;
}

/* LOGIN BOX */
.login-box{
position:relative;
width:320px;
padding:40px;
text-align:center;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(6px);
border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

transition:0.5s;
overflow:hidden;
}

/* EXPAND CARD */
.login-box:hover{
width:420px;
}

/* SPLIT PANEL EFFECT */
.login-box::before,
.login-box::after{
content:"";
position:absolute;
top:0;
width:50%;
height:100%;
background:rgba(255,255,255,0.05);
transition:0.5s;
z-index:-1;
}

.login-box::before{
left:0;
}

.login-box::after{
right:0;
}

/* PANELS MOVE */
.login-box:hover::before{
transform:translateX(-100%);
}

.login-box:hover::after{
transform:translateX(100%);
}

/* Title */
h1{
color:white;
margin-bottom:25px;
}

/* Inputs */
input{
width:100%;
padding:12px;
margin:12px 0;

border:none;
border-radius:6px;
outline:none;
transition:0.3s;
}

/* Input focus animation */
input:focus{
transform:scale(1.03);
box-shadow:0 0 8px #00ffc3;
}

/* Button */
button{
width:100%;
padding:12px;

background:#ff3d00;
color:white;

border:none;
border-radius:6px;

font-weight:bold;
cursor:pointer;

transition:0.3s;
}

/* Button hover */
button:hover{
background:#ff6e40;
transform:scale(1.05);
box-shadow:0 0 10px #ff3d00;
}

/* Error */
p{
margin-top:10px;
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Login</h1>

<form action="" method="post">
{% csrf_token %}

<input type="text" placeholder="Enter username" required name="username">

<input type="password" placeholder="Enter password" required name="password">

<button>Login</button>

</form>

{% if error %}
<p>{{error}}</p>
{% endif %}

</div>

</body>
</html>
