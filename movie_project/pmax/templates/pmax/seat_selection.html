<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* PAGE BACKGROUND */

body{
background:#141414;
color:white;
padding:40px;
}

/* MOVIE INFO */

h2{
margin-bottom:10px;
color:#00ff9d;
}

/* SEAT GRID */

.seatArea{ 
display:grid; 
grid-template-columns:repeat(auto-fit,minmax(70px,1fr)); 
gap:15px; 
margin-top:30px; 
}

/* SEAT BOX */

.seatArea div{
display:flex;
align-items:center;
justify-content:center;
padding:12px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.25s;
}

/* AVAILABLE SEATS */

.available{
background:#1f1f1f;
border:2px solid #00ff9d;
color:#00ff9d;
}

.available:hover{
background:#00ff9d;
color:black;
transform:scale(1.1);
}

/* BOOKED SEATS */

.booked{
background:#444;
border:2px solid #777;
color:#aaa;
cursor:not-allowed;
}

/* HIDE CHECKBOX */

.available input{
display:none;
}

/* LABEL */

label{
cursor:pointer;
}

/* SELECTED SEAT */

.available input:checked + label{
background:#e50914;
color:white;
padding:5px 8px;
border-radius:5px;
}

.poster{
width:220px;
border-radius:12px;
margin:20px 0;
box-shadow:0 0 20px rgba(0,255,157,0.4);
}

/*selected seat*/
.seatArea div.selected{
background-color: green;
color: aliceblue;
}
/*already booked seats*/
.seatArea div.booked{
background-color: rgb(214, 12, 12);
color: blanchedalmond;
cursor: not-allowed;
}

button{
background:#00ff9d;
color:#141414;
border:none;
padding:12px 30px;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
transition:0.3s;
margin-top:20px;
}

/* Hover Effect */

button:hover{
background:#00cc7a;
transform:scale(1.05);
box-shadow:0 0 10px #00ff9d;
}

/* Click Effect */

button:active{
transform:scale(0.98);
}

</style>
</head>
<body>
    <img src="{{show.movie.image.url}}" alt="movie poster" class="poster">
    <h2>Title: {{show.movie.name}}</h2>
    <h2>Theatre: {{show.theatre.name}}</h2>
    <h2>Show Time: {{show.show_time}}</h2>
    <h2>Available Seats: {{show.available_seats}}</h2>
    <h2>Price: {{show.price}}</h2>
    <form action="" method="post">
        {% csrf_token %}
        
        <div class="seatArea">
            {%for seat in seats %}
                <div id="{{seat}}" class="{% if seat in booked_seats %}booked{% else %}available{% endif %}" onclick="selectedSeats('{{seat}}')">
                    {{seat}}
                </div>
            {% endfor %}
        </div>
        <input type="hidden" name="selected_seat" id="selectedSeats"><br><br>
        <button>Confirm Booking</button>
    </form>
    <script>
        let selected = [];
        function selectedSeats(id){
            let seat = document.getElementById(id);
            if(seat.classList.contains('booked'))
            {
                return;
            }
            seat.classList.toggle('selected');
            if(seat.classList.contains('selected'))
            {
                selected.push(id);
            }
            else{
                selected = selected.filter(s => s !== id);
            }
            document.getElementById('selectedSeats').value = selected.join(',');
        }
    </script>
</body>
</html>
