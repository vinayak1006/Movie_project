<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies Dashboard</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body{
  background: radial-gradient(circle at top,#330000,#000000 60%);
  min-height:100vh;
  color:white;
}


/* Navbar */

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:20px 40px;

  background:linear-gradient(90deg,#000000,#1a0000,#000000);

  border-bottom:2px solid red;

  box-shadow:0 0 15px rgba(255,0,0,0.5);
}

.navbar h1{
  color:#ff2b2b;
  text-shadow:0 0 10px red;
}


/* Logout Button */

.logout-btn{

  background:linear-gradient(45deg,#ff0000,#b30000);

  color:white;

  border:none;

  padding:10px 18px;

  border-radius:8px;

  cursor:pointer;

  font-weight:bold;

  transition:0.3s;
}

.logout-btn:hover{

  box-shadow:
  0 0 12px red,
  0 0 20px red;

  transform:scale(1.05);
}



/* Container */

.container{

  display:flex;

  align-items:center;

  justify-content:center;

  flex-wrap:wrap;

  gap:35px;

  padding:40px;
}



/* Movie Cards */

.cards{

  backdrop-filter: blur(10px);

  background: rgba(0,0,0,0.75);

  border:1px solid rgba(255,0,0,0.35);

  box-shadow:
  0 0 15px rgba(255,0,0,0.3);

  padding:18px;

  border-radius:15px;

  width:220px;

  text-align:center;

  transition:0.3s;
}



/* Card hover animation */

.cards:hover{

  transform: translateY(-8px) scale(1.03);

  box-shadow:
  0 0 20px red,
  0 0 35px red;
}



/* Movie Image */

.cards img{

  width:100%;

  height:200px;

  object-fit:cover;

  border-radius:10px;

  margin-bottom:10px;

  transition:0.3s;
}


.cards:hover img{

  transform:scale(1.05);
}



/* Text */

.cards h2{

  font-size:15px;

  margin:5px 0;

  color:#ffb3b3;
}



/* View Button */

.view-btn{

  background:linear-gradient(45deg,#ff0000,#b30000);

  color:white;

  font-weight:bold;

  border:none;

  border-radius:8px;

  padding:8px 15px;

  margin-top:10px;

  cursor:pointer;

  transition:0.3s;
}


.view-btn:hover{

  box-shadow:
  0 0 10px red,
  0 0 20px red;

  transform:scale(1.05);
}


</style>

</head>


<body>

<div class="navbar">

<h1>🎬 Pmax</h1>

<a href="{% url 'logout' %}">
<button class="logout-btn">Logout</button>
</a>

</div>



<div class="container">

{% for i in movies %}

<div class="cards">

<img src="{{i.image.url}}" alt="movie">

<h2>Title: {{i.name}}</h2>
<h2>Duration: {{i.duration}} mins</h2>

<a href="{% url 'movie_detail' i.id %}">
<button class="view-btn">View</button>
</a>

</div>

{% empty %}

<h2>No movies available</h2>

{% endfor %}

</div>

</body>
</html>
