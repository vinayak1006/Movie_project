<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pmax</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#141414;
color:white;
}

/* NAVBAR */

/* NAVBAR */

.nav{
position:fixed;
top:0;
width:100%;
height:70px;
background:black;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
z-index:1000;
}

/* LOGO */

.logo{
font-size:32px;
font-weight:900;
color:#e50914;
letter-spacing:4px;
}

/* MENU */

.menu{
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
color:#e5e5e5;
font-size:18px;
position:relative;
transition:0.3s;
}

.menu a:hover{
color:white;
}

.menu a::after{
content:"";
position:absolute;
bottom:-5px;
left:0;
width:0%;
height:2px;
background:#e50914;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

/* RIGHT SIDE */

.nav-right{
display:flex;
align-items:center;
gap:20px;
}

/* SEARCH BAR */

.nav-right input{
padding:6px 10px;
border:none;
border-radius:3px;
outline:none;
}


/* PROFILE */

.profile{
position:relative;
cursor:pointer;
}

/* profile icon */

.profile img{
width:36px;
border-radius:4px;
transition:0.3s;
}

/* dropdown menu */

.dropdown{
position:absolute;
top:45px;
right:0;
background:#181818;
border-radius:6px;
width:160px;

box-shadow:0 10px 25px rgba(0,0,0,0.6);

display:none;
flex-direction:column;
z-index:2000;
}

/* show dropdown */

.profile:hover .dropdown,
.dropdown:hover{
display:flex;
}

/* dropdown links */

.dropdown a{
padding:12px 15px;
text-decoration:none;
color:#e5e5e5;
font-size:14px;
transition:0.2s;
display:block;
}

.dropdown a:hover{
background:#333;
color:white;
}
.dropdown::before{
content:"";
position:absolute;
top:-8px;
right:15px;
border-left:8px solid transparent;
border-right:8px solid transparent;
border-bottom:8px solid #181818;
}
.logo{
color:#e50914;
font-size:28px;
font-weight:bold;
}

.menu{
display:flex;
gap:30px;
}

.menu a{
text-decoration:none;
color:white;
font-size:18px;
transition:0.3s;
}

.menu a:hover{
color:#e50914;
}

/* HERO SLIDER */

.hero-slider{
position:relative;
height:500px;
overflow:hidden;
margin-top:70px;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
}

.hero-text{
position:absolute;
bottom:120px;
left:60px;
}

.hero-text h1{
font-size:50px;
margin-bottom:10px;
}

.hero-text button{
padding:10px 20px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
margin-right:10px;
}

.play{
background:white;
}

.info{
background:gray;
color:white;
}

/* MOVIE ROW */

.row{
margin-top:30px;
padding-left:30px;
}

.row h2{
margin-bottom:15px;
}

.row-posters{
display:flex;
overflow-x:auto;
gap:15px;
}

.row-posters::-webkit-scrollbar{
display:none;
}

.row-posters img{
height:250px;
border-radius:5px;
transition:0.4s;
cursor:pointer;
}

.row-posters img:hover{
transform:scale(1.1);
}

.logo{
font-size:32px;
font-weight:900;
color:#e50914;
letter-spacing:4px;
cursor:pointer;
text-shadow:0 0 10px #e50914;
transition:0.3s;
}

/* Hover glow */

.logo:hover{
transform:scale(1.1);
text-shadow:
0 0 5px #e50914,
0 0 20px #e50914,
0 0 40px #e50914;
}

.menu{
display:flex;
align-items:center;
gap:30px;
}

.menu a{
position:relative;
text-decoration:none;
color:#e5e5e5;
font-size:18px;
font-weight:500;
transition:0.3s;
}

/* hover text color */

.menu a:hover{
color:white;
}

/* red underline animation */

.menu a::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:#e50914;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

/* signup & login button style */

.menu a:nth-last-child(2),
.menu a:last-child{
background:#e50914;
padding:6px 14px;
border-radius:4px;
font-weight:bold;
}

.menu a:nth-last-child(2):hover,
.menu a:last-child:hover{
background:#f40612;
}

</style>
</head>

<div class="logo">PMAX</div>

index++;

if(index>=slides.length){
index=0;
}

slides[index].classList.add("active");

}

setInterval(autoSlide,4000);

</script>
